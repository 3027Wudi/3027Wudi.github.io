<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #gameCanvas {
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            background: #1a1a2e;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .score {
            font-weight: bold;
            color: #ffd700;
        }

        .instructions {
            margin-top: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇游戏</h1>
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <div class="controls">
        <button onclick="startGame()">开始游戏</button>
        <button onclick="pauseGame()">暂停/继续</button>
        <button onclick="resetGame()">重新开始</button>
    </div>
    <div class="info">
        得分: <span class="score" id="score">0</span>
    </div>
    <div class="instructions">
        使用键盘方向键 ↑ ↓ ← → 控制蛇的移动方向
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 游戏设置
        const gridSize = 20;
        const gridCount = canvas.width / gridSize;

        // 蛇的初始状态
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let dx = 1;
        let dy = 0;
        let food = { x: 15, y: 10 };
        let score = 0;
        let gameLoop;
        let isPaused = false;

        // 绘制蛇
        function drawSnake() {
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4ade80' : '#22c55e';
                ctx.shadowColor = '#4ade80';
                ctx.shadowBlur = 10;
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
                ctx.shadowBlur = 0;
            });
        }

        // 绘制食物
        function drawFood() {
            ctx.fillStyle = '#f87171';
            ctx.shadowColor = '#f87171';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 移动蛇
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // 边界检测
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                gameOver();
                return;
            }

            // 自身碰撞检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        // 生成食物
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * gridCount),
                y: Math.floor(Math.random() * gridCount)
            };
            // 确保食物不在蛇身上
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                spawnFood();
            }
        }

        // 游戏主循环
        function gameLoopFn() {
            if (isPaused) return;
            
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawSnake();
            drawFood();
            moveSnake();

            gameLoop = setTimeout(gameLoopFn, 100);
        }

        // 开始游戏
        function startGame() {
            if (!gameLoop) {
                gameLoopFn();
            }
        }

        // 暂停/继续
        function pauseGame() {
            isPaused = !isPaused;
            if (!isPaused && gameLoop) {
                gameLoopFn();
            }
        }

        // 重新开始
        function resetGame() {
            clearTimeout(gameLoop);
            gameLoop = null;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            isPaused = false;
            spawnFood();
            
            // 清空画布并绘制初始状态
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawSnake();
            drawFood();
        }

        // 游戏结束
        function gameOver() {
            clearTimeout(gameLoop);
            gameLoop = null;
            alert(`游戏结束！最终得分: ${score}`);
            resetGame();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (dy !== 1) {
                        dx = 0;
                        dy = -1;
                    }
                    break;
                case 'ArrowDown':
                    if (dy !== -1) {
                        dx = 0;
                        dy = 1;
                    }
                    break;
                case 'ArrowLeft':
                    if (dx !== 1) {
                        dx = -1;
                        dy = 0;
                    }
                    break;
                case 'ArrowRight':
                    if (dx !== -1) {
                        dx = 1;
                        dy = 0;
                    }
                    break;
            }
        });

        // 初始化绘制
        resetGame();
    </script>
</body>
</html>
